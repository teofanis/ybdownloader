name: Extension Release

on:
  push:
    tags:
      - "ext-v*"

env:
  NODE_VERSION: "24"

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/ext-v}
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building extension version: $VERSION"

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Update version in package.json
        run: pnpm --filter @ybdownload/extension version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Build and package extension
        run: ./scripts/package-extension-release.sh ${{ steps.version.outputs.VERSION }}

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v7
        with:
          name: chrome-extension
          path: apps/extension/chrome-extension-*.zip

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v7
        with:
          name: firefox-extension
          path: apps/extension/firefox-extension-*.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Chrome artifact
        uses: actions/download-artifact@v8
        with:
          name: chrome-extension
          path: artifacts/

      - name: Download Firefox artifact
        uses: actions/download-artifact@v8
        with:
          name: firefox-extension
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "Browser Extension v${{ needs.build.outputs.version }}"
          body: |
            ## YBDownloader Browser Extension v${{ needs.build.outputs.version }}

            ### Installation

            **Chrome / Edge / Brave:**
            1. Download `chrome-extension-${{ needs.build.outputs.version }}.zip`
            2. Extract the zip file
            3. Go to `chrome://extensions` (or equivalent)
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the extracted folder

            **Firefox:**
            1. Download `firefox-extension-${{ needs.build.outputs.version }}.zip`
            2. Go to `about:debugging#/runtime/this-firefox`
            3. Click "Load Temporary Add-on"
            4. Select the zip file

            ### Features
            - One-click download button on YouTube videos
            - Format selection (MP3, MP4, WebM)
            - Deep link integration with YBDownloader app
          files: |
            artifacts/chrome-extension-*.zip
            artifacts/firefox-extension-*.zip
          draft: false
          prerelease: false
