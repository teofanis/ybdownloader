name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "24"
  PNPM_VERSION: "10.12.1"

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build
        working-directory: .

      - name: Install Go dependencies
        run: go mod download

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage and JUnit output
        run: |
          mkdir -p test-results
          gotestsum --junitfile test-results/go-junit.xml -- \
            -v -race -coverprofile=coverage.txt -covermode=atomic -short ./...

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/desktop/coverage.txt
          flags: backend
          name: go-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload Go test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: ./apps/desktop/test-results/go-junit.xml
          flags: backend
          name: go-tests

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build
        working-directory: .

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/desktop
          args: --timeout=5m

  js-test:
    name: JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm turbo run type-check lint --filter=@ybdownload/desktop-ui --filter=@ybdownload/shared --filter=@ybdownload/ui --filter=@ybdownload/extension

      - name: Check translations
        run: pnpm --filter @ybdownload/desktop-ui i18n:check

      - name: Run tests with coverage
        run: pnpm turbo run test:coverage --filter=@ybdownload/desktop-ui --filter=@ybdownload/shared

      - name: Upload Frontend coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/desktop/frontend/coverage/lcov.info
          disable_search: true
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload Frontend test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: apps/desktop/frontend/test-results/junit.xml
          disable_search: true
          flags: frontend
          name: frontend-tests
          fail_ci_if_error: false

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build

  extension-test:
    name: Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint extension
        run: pnpm --filter @ybdownload/extension lint

      - name: Build extension
        run: pnpm --filter @ybdownload/extension build

  build-check:
    name: Build Check
    needs: [go-test, go-lint, js-test, extension-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/desktop/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build
        working-directory: .

      - name: Wails build (Linux)
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Check Go build (Windows cross-compile)
        run: GOOS=windows GOARCH=amd64 go build -o /dev/null .

      - name: Check Go build (macOS cross-compile)
        run: GOOS=darwin GOARCH=amd64 go build -o /dev/null .

  js-security:
    name: JS Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (high+)
        run: pnpm audit --audit-level=high
