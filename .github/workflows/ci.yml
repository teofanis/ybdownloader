name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "24"

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup desktop toolchain
        uses: ./.github/actions/setup-desktop-toolchain
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build
        working-directory: .

      - name: Install Go dependencies
        run: go mod download

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage and JUnit output
        run: |
          mkdir -p test-results
          gotestsum --junitfile test-results/go-junit.xml -- \
            -v -race -coverprofile=coverage.txt -covermode=atomic -short ./...

      - name: Upload Go coverage
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/desktop/coverage.txt
          flags: backend
          name: go-coverage

      - name: Upload Go test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./apps/desktop/test-results/go-junit.xml
          flags: backend
          name: go-tests
          report-type: test_results

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup desktop toolchain
        uses: ./.github/actions/setup-desktop-toolchain
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build
        working-directory: .

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/desktop
          args: --timeout=5m

  js-test:
    name: JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          turbo-cache: "true"

      - name: Type check
        run: pnpm turbo run type-check lint --filter=@ybdownload/desktop-ui --filter=@ybdownload/shared --filter=@ybdownload/ui --filter=@ybdownload/extension

      - name: Check translations
        run: pnpm --filter @ybdownload/desktop-ui i18n:check

      - name: Run tests with coverage
        run: pnpm turbo run test:coverage --filter=@ybdownload/desktop-ui --filter=@ybdownload/shared

      - name: Upload frontend coverage
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/desktop/frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          disable-search: "true"

      - name: Upload frontend test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/upload-codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/desktop/frontend/test-results/junit.xml
          flags: frontend
          name: frontend-tests
          report-type: test_results
          disable-search: "true"

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build

  extension-test:
    name: Extension Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint extension
        run: pnpm --filter @ybdownload/extension lint

      - name: Build extension
        run: pnpm --filter @ybdownload/extension build

  build-check:
    name: Build Check
    needs: [go-test, go-lint, js-test, extension-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v7

      - name: Setup desktop toolchain
        uses: ./.github/actions/setup-desktop-toolchain
        with:
          go-version: ${{ env.GO_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - uses: ./.github/actions/install-linux-desktop-deps

      - uses: ./.github/actions/install-wails

      - name: Build desktop UI
        run: pnpm --filter @ybdownload/desktop-ui build
        working-directory: .

      - name: Wails build (Linux)
        run: wails build -platform linux/amd64 -tags webkit2_41

      - name: Check Go build (Windows cross-compile)
        run: GOOS=windows GOARCH=amd64 go build -o /dev/null .

      - name: Check Go build (macOS cross-compile)
        run: GOOS=darwin GOARCH=amd64 go build -o /dev/null .

  js-security:
    name: JS Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit dependencies (high+)
        run: pnpm audit --audit-level=high
