name: E2E Nightly

on:
  schedule:
    # 02:00 UTC daily
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  NODE_VERSION: "24"
  WEB_SITE_URL: ${{ vars.WEB_SITE_URL || 'https://ybdownload.pages.dev' }}

jobs:
  nightly:
    name: Playwright nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: "true"

      - name: Run nightly tests
        uses: ./.github/actions/run-playwright-e2e
        with:
          npm-script: test:nightly
          artifact-prefix: e2e-nightly
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  web-live:
    name: Web production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: "true"

      - name: Wait for production site
        env:
          SITE_URL: ${{ env.WEB_SITE_URL }}
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS "${SITE_URL}/" >/dev/null; then
              echo "Site is up: ${SITE_URL}"
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in 5s..."
            sleep 5
          done
          echo "::error::Production site unreachable: ${SITE_URL}"
          exit 1

      - name: Run Playwright against production
        uses: ./.github/actions/run-playwright-e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.WEB_SITE_URL }}
        with:
          npm-script: test:web:live
          artifact-prefix: e2e-web-live

  lighthouse-live:
    name: Web production Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: "true"

      - uses: browser-actions/setup-chrome@v2
        id: chrome
        with:
          install-dependencies: true

      - name: Wait for production site
        env:
          SITE_URL: ${{ env.WEB_SITE_URL }}
        run: |
          for attempt in 1 2 3 4 5; do
            if curl -fsS "${SITE_URL}/" >/dev/null; then
              echo "Site is up: ${SITE_URL}"
              exit 0
            fi
            echo "Attempt ${attempt} failed; retrying in 5s..."
            sleep 5
          done
          echo "::error::Production site unreachable: ${SITE_URL}"
          exit 1

      - name: Run Lighthouse against production
        working-directory: apps/web
        env:
          CI: true
          LIGHTHOUSE_BASE_URL: ${{ env.WEB_SITE_URL }}
          CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          LHCI_COLLECT__SETTINGS__CHROME_FLAGS: "--no-sandbox --disable-dev-shm-usage --disable-gpu --disable-setuid-sandbox"
        run: pnpm lighthouse:ci:live

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-live-report
          path: apps/web/.lighthouseci/
          retention-days: 14
          if-no-files-found: ignore
