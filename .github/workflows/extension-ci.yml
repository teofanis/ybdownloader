name: Extension CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/extension/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/extension-ci.yml"
      - ".github/actions/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/extension/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/extension-ci.yml"
      - ".github/actions/**"

permissions:
  contents: read

env:
  NODE_VERSION: "24"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint extension
        run: pnpm --filter @ybdownload/extension lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build extension
        run: pnpm --filter @ybdownload/extension build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-chrome-mv3
          path: apps/extension/build/chrome-mv3-prod/
          retention-days: 7
