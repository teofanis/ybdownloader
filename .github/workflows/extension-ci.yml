name: Extension CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/extension/**"
      - "apps/e2e/tests/extension/**"
      - "apps/e2e/fixtures/extension-test.ts"
      - "apps/e2e/helpers/extension-*.ts"
      - "apps/e2e/global-setup.extension.ts"
      - "apps/e2e/playwright.extension.config.ts"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/extension-ci.yml"
      - ".github/actions/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/extension/**"
      - "apps/e2e/tests/extension/**"
      - "apps/e2e/fixtures/extension-test.ts"
      - "apps/e2e/helpers/extension-*.ts"
      - "apps/e2e/global-setup.extension.ts"
      - "apps/e2e/playwright.extension.config.ts"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/extension-ci.yml"
      - ".github/actions/**"

permissions:
  contents: read
  checks: write

env:
  NODE_VERSION: "24"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint extension
        run: pnpm --filter @ybdownload/extension lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build extension
        run: pnpm --filter @ybdownload/extension build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-chrome-mv3
          path: apps/extension/build/chrome-mv3-prod/
          retention-days: 7

  e2e:
    name: Extension E2E
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          install: "true"

      - name: Download extension build
        uses: actions/download-artifact@v8
        with:
          name: extension-chrome-mv3
          path: apps/extension/build/chrome-mv3-prod/

      - name: Run extension Playwright tests
        uses: ./.github/actions/run-playwright-e2e
        with:
          npm-script: test:extension
          artifact-prefix: e2e-extension
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
