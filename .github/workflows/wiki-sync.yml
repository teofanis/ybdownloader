name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Push docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Clone wiki repository
        env:
          WIKI_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: git clone "$WIKI_URL" wiki-repo

      - name: Copy wiki pages
        run: cp docs/wiki/*.md wiki-repo/

      - name: Commit and push
        working-directory: wiki-repo
        env:
          SHA_SHORT: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Wiki already up to date."
            exit 0
          fi
          git commit -m "docs: sync from main (${SHA_SHORT:0:7})"
          git push origin HEAD
