name: Run Playwright E2E
description: Install Chromium and run a Playwright npm script in apps/e2e

inputs:
  npm-script:
    description: Script name in apps/e2e package.json (e.g. test:smoke)
    required: true
  upload-artifacts:
    description: Upload HTML report and test-results on completion
    required: false
    default: "true"
  artifact-prefix:
    description: Prefix for uploaded artifact names
    required: false
    default: playwright
  codecov-token:
    description: CODECOV_TOKEN for JUnit test-results upload (optional)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Playwright browsers
      shell: bash
      working-directory: apps/e2e
      # Full chromium (not headless-shell) is required for MV3 extensions in CI.
      run: pnpm exec playwright install --with-deps --no-shell chromium

    - name: Run Playwright tests
      shell: bash
      working-directory: apps/e2e
      run: pnpm ${{ inputs.npm-script }}

    - name: Upload Playwright report
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-prefix }}-report
        path: apps/e2e/playwright-report/
        retention-days: 30

    - name: Upload test results
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-prefix }}-test-results
        path: apps/e2e/test-results/
        retention-days: 30

    - name: Publish JUnit report
      if: ${{ !cancelled() }}
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: apps/e2e/test-results/junit.xml
        check_name: Playwright (${{ inputs.artifact-prefix }})
        comment_mode: off

    - name: Upload E2E test results to Codecov
      if: ${{ !cancelled() && inputs.codecov-token != '' }}
      uses: ./.github/actions/upload-codecov
      with:
        token: ${{ inputs.codecov-token }}
        files: apps/e2e/test-results/junit.xml
        flags: e2e
        name: ${{ inputs.artifact-prefix }}-tests
        report-type: test_results
        disable-search: "true"
