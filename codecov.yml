# Codecov configuration for YBDownloader
# https://docs.codecov.com/docs/codecov-yaml

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 2%
        informational: false
      backend:
        paths:
          - "apps/desktop/internal/**"
        target: 60%
        threshold: 2%
      frontend:
        paths:
          - "apps/desktop/frontend/src/**"
        target: 50%
        threshold: 2%
    patch:
      default:
        target: 60%
        threshold: 5%

flags:
  backend:
    paths:
      - apps/desktop/internal/
    carryforward: true
    after_n_builds: 1
  frontend:
    paths:
      - apps/desktop/frontend/src/
    carryforward: true
    after_n_builds: 1
  e2e:
    paths:
      - apps/e2e/**
    carryforward: true
    after_n_builds: 1

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  - "apps/desktop/frontend/wailsjs/**"
  - "apps/desktop/frontend/dist/**"
  - "apps/desktop/frontend/node_modules/**"
  - "apps/desktop/frontend/src/test/**"
  - "**/*.d.ts"
  - "**/mocks/**"
  - "**/testdata/**"
  - "apps/desktop/build/**"
  - "scripts/**"
  - "packages/**"

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 10%
  individual_components:
    - component_id: backend_core
      name: Backend Core
      paths:
        - apps/desktop/internal/core/**
    - component_id: backend_infra
      name: Backend Infrastructure
      paths:
        - apps/desktop/internal/infra/**
    - component_id: backend_app
      name: Backend App
      paths:
        - apps/desktop/internal/app/**
    - component_id: frontend_components
      name: Frontend Components
      paths:
        - apps/desktop/frontend/src/components/**
    - component_id: frontend_features
      name: Frontend Features
      paths:
        - apps/desktop/frontend/src/features/**
    - component_id: frontend_lib
      name: Frontend Libraries
      paths:
        - apps/desktop/frontend/src/lib/**
        - apps/desktop/frontend/src/hooks/**
        - apps/desktop/frontend/src/store/**
