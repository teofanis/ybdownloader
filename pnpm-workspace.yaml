packages:
  - "apps/desktop/frontend"
  - "apps/extension"
  - "apps/e2e"
  - "apps/web"
  - "packages/*"

# Plasmo/Parcel expect some deps at the workspace root; hoist selectively, not globally.
publicHoistPattern:
  - "@ybdownload/*"
  - "@plasmohq/*"
  - "plasmo"
  - "*react*"
  - "*parcel*"

strictPeerDependencies: false

overrides:
  content-security-policy-parser: ">=0.6.0"
  msgpackr: ">=1.10.1"
  # Transitive deps with missing/weaker npm trust evidence (pnpm no-downgrade).
  chokidar: "5.0.0" # @astrojs/check; see paulmillr/chokidar#1440
  semver: "7.7.2"
  # Security: align transitive tooling to patched advisories (pnpm audit).
  esbuild: ">=0.28.1"
  yaml: ">=2.8.3"
  tsup: ">=8.3.5"
  # Plasmo pulls svelte 4.x for an optional transformer; extension is React-only.
  svelte: ">=5.55.7"

# Block packages whose trust level was downgraded vs the lockfile.
trustPolicy: no-downgrade
# Allowlisted versions: signed releases missing provenance/trusted-publisher metadata.
trustPolicyExclude:
  - graphql@15.10.2 # plasmo → @parcel/transformer-graphql
  - rollup@3.30.0
  - semver@5.7.2
  - semver@6.3.1

# --- Supply chain hardening (pnpm 10+) ---
# Delay installing freshly published package versions (24h).
minimumReleaseAge: 1440
minimumReleaseAgeStrict: false

# Re-verify lockfile integrity before pnpm run / pnpm exec.
verifyDepsBeforeRun: true

# pnpm 11+: explicit allowlist for dependency install/build scripts.
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  sharp: true
  workerd: true
